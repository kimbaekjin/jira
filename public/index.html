<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>숙제 체크</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container" id="container"></div>

  <!-- 작은 노래 박스 -->
<div class="music-box" id="musicBox">
  <div class="music-title">🎵 BGM</div>

  <!-- 🔍 검색 영역 -->
  <div class="yt-search">
    <input type="text" id="ytSearchInput" placeholder="유튜브 검색..." />
    <button id="ytSearchBtn">검색</button>
  </div>

  <!-- 📄 검색 결과 -->
  <div class="yt-results" id="ytResults"></div>

  <!-- 🎬 플레이어 -->
  <iframe
    id="ytPlayer"
    src="https://www.youtube.com/embed/7EPx1wkkqBI"
    frameborder="0"
    allowfullscreen>
  </iframe>

  <!-- 리사이즈 핸들 그대로 유지 -->
  <div class="resize top"></div>
  <div class="resize right"></div>
  <div class="resize bottom"></div>
  <div class="resize left"></div>
  <div class="resize corner top-left"></div>
  <div class="resize corner top-right"></div>
  <div class="resize corner bottom-left"></div>
  <div class="resize corner bottom-right"></div>
</div>

  <script type="module" src="./app.js"></script>
</body>
</html>
